# ─────────────────────────────────────────────────────────────────
#  Documentation: build Sphinx HTML and publish to GitHub Pages
#
#  Builds the docs/ tree with Sphinx (autodoc pulls docstrings from the
#  package) and deploys the result to GitHub Pages on every push to the
#  default branch.
#
#  One-time repository setup (Settings -> Pages):
#    set the Pages "Source" to "GitHub Actions" (not "Deploy from a
#    branch").  The published site then appears at
#    https://<owner>.github.io/<repo>/ and behind the README docs badge.
# ─────────────────────────────────────────────────────────────────
name: docs

on:
  push:
    branches: [master, main]

# Permissions for the GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancelling superseded runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # setuptools-scm needs the tags

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and docs requirements
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r docs/requirements.txt

      - name: Build HTML docs
        run: sphinx-build -b html docs docs/_build/html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
