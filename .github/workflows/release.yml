# ─────────────────────────────────────────────────────────────────
#  Release: build distributions and publish a GitHub Release
#
#  Triggered by pushing a version tag (e.g. `git tag -a v0.1.0 -m ...`
#  then `git push origin v0.1.0`).  setuptools-scm derives the package
#  version from that tag.  The job gates on the test suite, builds an
#  sdist + wheel, and attaches them to an auto-generated GitHub Release.
#  With the Zenodo-GitHub integration enabled, each Release also mints a
#  citable DOI from CITATION.cff.
# ─────────────────────────────────────────────────────────────────
name: release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write              # required to create a GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # setuptools-scm derives the version from the tag

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install build

      - name: Test gate (never release a broken build)
        run: pytest -q

      - name: Build sdist and wheel
        run: python -m build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
